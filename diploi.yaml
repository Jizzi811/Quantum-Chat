# This file is used to build the infrastructure for a deployment.
# After editing something here, apply the changes on the Diploi dashboard.
# For more information, see https://diploi.com/yaml

diploiVersion: v1.0
components:
  - name: Static Website
    identifier: static
    folder: /
    package: https://github.com/diploi/component-static#v2
    env:
      include:
        - value: ''
          name: QUANTUM_ACCESS_TOKEN
        - value: ''
          name: GROQ_API_KEY
        - value: ''
          name: NVIDIA_API_KEY
        - value: ''
          name: GEMINI_API_KEY
        - value: ''
          name: OPENROUTER_API_KEY
        - value: ''
          name: STRIPE_SECRET_KEY
        - value: ''
          name: STRIPE_PRICE_ID
        - value: ''
          name: PRESENTON_URL
  - name: Static Website
    identifier: presenton
    folder: presenton
    package: https://github.com/diploi/component-static#v2
    env:
      include:
        - value: ''
          name: LLM
        - value: ''
          name: OPENROUTER_API_KEY
        - value: ''
          name: OPENROUTER_MODEL
        - value: ''
          name: IMAGE_PROVIDER
        - value: ''
          name: PIXABAY_API_KEY
        - value: 'false'
          name: CAN_CHANGE_KEYS
        - value: ''
          name: AUTH_USERNAME
        - value: ''
          name: AUTH_PASSWORD
        - value: 'true'
          name: DISABLE_ANONYMOUS_TRACKING
addons: []
